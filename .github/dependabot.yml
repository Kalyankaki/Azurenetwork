version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    labels:
      - "dependencies"
    groups:
      firebase:
        patterns:
          - "firebase"
          - "@firebase/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "esbuild"

  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "functions"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
