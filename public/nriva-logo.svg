<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="95" fill="#fff8e1" stroke="#ff8f00" stroke-width="3"/>
  <circle cx="100" cy="100" r="80" fill="#fff3e0"/>
  <!-- Globe shape -->
  <ellipse cx="100" cy="95" rx="50" ry="50" fill="#ff9800" opacity="0.3"/>
  <ellipse cx="90" cy="90" rx="30" ry="45" fill="#ff6f00" opacity="0.4"/>
  <ellipse cx="110" cy="90" rx="25" ry="40" fill="#1a237e" opacity="0.3"/>
  <!-- India flag colors -->
  <path d="M60 70 Q100 50 140 70" stroke="#ff6f00" fill="none" stroke-width="3"/>
  <path d="M60 95 Q100 75 140 95" stroke="#1a237e" fill="none" stroke-width="2"/>
  <path d="M60 85 Q100 65 140 85" stroke="#2e7d32" fill="none" stroke-width="3"/>
  <!-- NRIVA text -->
  <text x="100" y="45" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#1a237e">NRIVA</text>
  <!-- Connecting to Serve -->
  <text x="100" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#1a237e">Connecting to Serve</text>
